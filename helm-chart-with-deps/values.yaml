# Default values for webapp-with-deps
replicaCount: 1

image:
  repository: nginx
  tag: "1.21"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

# Redis configuration
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: "testpass"
  primary:
    persistence:
      enabled: false
