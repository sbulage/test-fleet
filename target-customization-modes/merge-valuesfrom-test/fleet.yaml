defaultNamespace: merge-valuesfrom-test
helm:
  chart: .

targetCustomizationMode: AllMatches

targetCustomizations:
  - name: base
    clusterSelector: {}
    helm:
      valuesFrom:
        - configMapKeyRef:
            name: base-config
            key: values.yaml

  - name: edge
    clusterSelector:
      matchLabels:
        edge: "true"
    helm:
      valuesFrom:
        - configMapKeyRef:
            name: edge-config
            key: values.yaml

  - name: monitoring
    clusterSelector:
      matchLabels:
        monitoring: "enabled"
    helm:
      valuesFrom:
        - configMapKeyRef:
            name: monitoring-config
            key: values.yaml
